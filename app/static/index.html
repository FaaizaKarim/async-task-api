<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Async Task Manager</title>
<style>
  :root {
    --bg: #0f1117; --panel: #181b25; --card: #1f2330; --border: #2a2f40;
    --text: #e8eaf2; --muted: #8b91a7; --accent: #6c8cff; --accent2: #4f6ef7;
    --ok: #34d399; --warn: #fbbf24; --danger: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  header { display: flex; justify-content: space-between; align-items: center; padding: 16px 28px; background: var(--panel); border-bottom: 1px solid var(--border); }
  header h1 { font-size: 20px; letter-spacing: .3px; }
  header h1 span { color: var(--accent); }
  .badge { font-size: 12px; color: var(--muted); }
  .badge a { color: var(--accent); text-decoration: none; }
  #userbox { display: flex; gap: 12px; align-items: center; font-size: 14px; color: var(--muted); }
  button { cursor: pointer; border: none; border-radius: 8px; font-size: 14px; padding: 9px 16px; background: var(--accent2); color: white; transition: filter .15s; }
  button:hover { filter: brightness(1.15); }
  button.ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  /* auth */
  #auth { max-width: 380px; margin: 9vh auto; background: var(--panel); padding: 34px; border-radius: 16px; border: 1px solid var(--border); }
  #auth h2 { margin-bottom: 6px; }
  #auth p { color: var(--muted); font-size: 14px; margin-bottom: 22px; }
  input, textarea { width: 100%; padding: 11px 13px; margin-bottom: 12px; background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; }
  input:focus, textarea:focus { outline: 1px solid var(--accent); }
  #auth button { width: 100%; margin-top: 4px; }
  .switch { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); }
  .switch a { color: var(--accent); cursor: pointer; }
  #msg { margin-top: 14px; font-size: 13px; text-align: center; min-height: 18px; }
  #msg.err { color: var(--danger); } #msg.ok { color: var(--ok); }
  /* board */
  #board { display: none; padding: 24px 28px; }
  #newtask { display: flex; gap: 10px; margin-bottom: 24px; max-width: 720px; }
  #newtask input { margin: 0; }
  .columns { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; }
  .col { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 16px; min-height: 220px; }
  .col h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 14px; display: flex; justify-content: space-between; }
  .col h3 .count { color: var(--muted); }
  .col.todo h3 { color: var(--warn); } .col.in_progress h3 { color: var(--accent); } .col.done h3 { color: var(--ok); }
  .task { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; margin-bottom: 10px; }
  .task .t { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .task .d { font-size: 13px; color: var(--muted); margin-bottom: 10px; white-space: pre-wrap; }
  .task .actions { display: flex; gap: 8px; }
  .task .actions button { padding: 5px 10px; font-size: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); }
  .task .actions button:hover { color: var(--text); border-color: var(--accent); }
  .task .actions button.del:hover { color: var(--danger); border-color: var(--danger); }
  .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 20px 0; }
</style>
</head>
<body>
<header>
  <h1>Task<span>Flow</span></h1>
  <span class="badge">FastAPI · asyncio · JWT &nbsp;|&nbsp; <a href="/docs">API docs</a></span>
  <div id="userbox"></div>
</header>

<section id="auth">
  <h2 id="authTitle">Sign in</h2>
  <p>Async task manager demo — register a free account.</p>
  <input id="email" type="email" placeholder="Email" autocomplete="username">
  <input id="password" type="password" placeholder="Password (min 8 chars)" autocomplete="current-password">
  <button id="authBtn" onclick="submitAuth()">Sign in</button>
  <div class="switch"><span id="switchText">No account?</span> <a onclick="toggleMode()" id="switchLink">Register</a></div>
  <div id="msg"></div>
</section>

<section id="board">
  <div id="newtask">
    <input id="title" placeholder="Task title" maxlength="200">
    <input id="desc" placeholder="Description (optional)" maxlength="5000">
    <button onclick="createTask()">Add</button>
  </div>
  <div class="columns">
    <div class="col todo"><h3>To do <span class="count" id="c-todo"></span></h3><div id="l-todo"></div></div>
    <div class="col in_progress"><h3>In progress <span class="count" id="c-in_progress"></span></h3><div id="l-in_progress"></div></div>
    <div class="col done"><h3>Done <span class="count" id="c-done"></span></h3><div id="l-done"></div></div>
  </div>
</section>

<script>
let token = localStorage.getItem("token");
let registerMode = false;

const $ = (id) => document.getElementById(id);
const esc = (s) => s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function setMsg(text, cls) { const m = $("msg"); m.textContent = text; m.className = cls || ""; }

function toggleMode() {
  registerMode = !registerMode;
  $("authTitle").textContent = registerMode ? "Create account" : "Sign in";
  $("authBtn").textContent  = registerMode ? "Register" : "Sign in";
  $("switchText").textContent = registerMode ? "Have an account?" : "No account?";
  $("switchLink").textContent = registerMode ? "Sign in" : "Register";
  setMsg("");
}

async function api(path, opts = {}) {
  opts.headers = Object.assign({}, opts.headers, token ? { "Authorization": "Bearer " + token } : {});
  const res = await fetch(path, opts);
  if (res.status === 401 && token) { logout(); throw new Error("Session expired — sign in again"); }
  if (!res.ok) {
    let detail = res.statusText;
    try { const b = await res.json(); detail = typeof b.detail === "string" ? b.detail : JSON.stringify(b.detail); } catch {}
    throw new Error(detail);
  }
  return res.status === 204 ? null : res.json();
}

async function submitAuth() {
  const email = $("email").value.trim(), password = $("password").value;
  try {
    if (registerMode) {
      await api("/auth/register", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, password }) });
      setMsg("Account created — signing you in…", "ok");
    }
    const form = new URLSearchParams({ username: email, password });
    const data = await api("/auth/login", { method: "POST", body: form });
    token = data.access_token;
    localStorage.setItem("token", token);
    localStorage.setItem("email", email);
    showBoard();
  } catch (e) { setMsg(e.message, "err"); }
}

function logout() {
  token = null; localStorage.removeItem("token"); localStorage.removeItem("email");
  $("board").style.display = "none"; $("auth").style.display = "block"; $("userbox").innerHTML = "";
}

async function showBoard() {
  $("auth").style.display = "none"; $("board").style.display = "block";
  $("userbox").innerHTML = esc(localStorage.getItem("email") || "") + ' <button class="ghost" onclick="logout()">Sign out</button>';
  await refresh();
}

async function refresh() {
  const tasks = await api("/tasks?limit=200");
  const groups = { todo: [], in_progress: [], done: [] };
  tasks.forEach(t => groups[t.status].push(t));
  for (const [status, list] of Object.entries(groups)) {
    $("c-" + status).textContent = list.length;
    $("l-" + status).innerHTML = list.length ? list.map(card).join("") : '<div class="empty">Nothing here</div>';
  }
}

const NEXT = { todo: "in_progress", in_progress: "done", done: "todo" };
const NEXT_LABEL = { todo: "Start →", in_progress: "Finish ✓", done: "Reopen ↺" };

function card(t) {
  return `<div class="task">
    <div class="t">${esc(t.title)}</div>
    ${t.description ? `<div class="d">${esc(t.description)}</div>` : ""}
    <div class="actions">
      <button onclick="move(${t.id}, '${NEXT[t.status]}')">${NEXT_LABEL[t.status]}</button>
      <button class="del" onclick="removeTask(${t.id})">Delete</button>
    </div>
  </div>`;
}

async function createTask() {
  const title = $("title").value.trim();
  if (!title) return;
  await api("/tasks", { method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title, description: $("desc").value.trim() }) });
  $("title").value = ""; $("desc").value = "";
  refresh();
}

async function move(id, status) {
  await api("/tasks/" + id, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ status }) });
  refresh();
}

async function removeTask(id) {
  await api("/tasks/" + id, { method: "DELETE" });
  refresh();
}

$("password").addEventListener("keydown", e => { if (e.key === "Enter") submitAuth(); });
$("title").addEventListener("keydown", e => { if (e.key === "Enter") createTask(); });
if (token) showBoard();
</script>
</body>
</html>
